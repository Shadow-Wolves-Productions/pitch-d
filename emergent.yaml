name: pitchd
services:
  backend:
    type: python
    directory: backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    env:
      - ANTHROPIC_API_KEY
  frontend:
    type: static
    directory: .
    build_command: npm install && npm run build
    output_directory: dist
    routes:
      - path: /api/*
        proxy: backend
      - path: /*
        serve: index.html
